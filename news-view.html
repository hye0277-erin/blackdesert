<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>새소식 | BLACK DESERT</title>
  <meta name="description" content="검은사막 새소식 상세 보기" />

  <!-- 폰트 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

  <!-- CSS -->
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/renewal.css" />
</head>
<body class="rn">
  <a href="#main" class="skip-link">본문 바로가기</a>

  <!-- 공통 헤더 -->
  <div data-include="header"></div>

  <main id="main" data-news-view>

    <!-- 상단 배너 -->
    <section class="rn-pagehead" aria-label="새소식">
      <div class="rn-pagehead__bg" aria-hidden="true"></div>
      <div class="rn-inner">
        <p class="rn-pagehead__eyebrow">News</p>
        <h1 class="rn-pagehead__title rn-gold-text">새소식</h1>
      </div>
    </section>

    <section class="rn-section" style="padding-top:clamp(40px,6vh,70px)">
      <div class="rn-inner">
        <article class="rn-nv rn-reveal" id="newsViewBody">
          <div class="rn-nv__head">
            <span class="rn-nv__cat" id="nvCat">공지</span>
            <h2 class="rn-nv__title" id="nvTitle">제목</h2>
            <p class="rn-nv__date" id="nvDate">2026.00.00</p>
          </div>
          <div class="rn-nv__body" id="nvBody"></div>

          <!-- 이전/다음 -->
          <nav class="rn-nv__nav" aria-label="이전 다음 글">
            <a class="rn-nv__navitem" id="nvPrev">
              <span class="rn-nv__navlabel">이전 글</span>
              <span class="rn-nv__navtitle"></span>
            </a>
            <a class="rn-nv__navitem" id="nvNext">
              <span class="rn-nv__navlabel">다음 글</span>
              <span class="rn-nv__navtitle"></span>
            </a>
          </nav>
        </article>

        <div class="rn-form__actions">
          <a href="news.html" class="rn-btn rn-btn--ghost">목록으로</a>
          <a href="news-write.html" class="rn-btn rn-btn--primary">글쓰기 <span aria-hidden="true">✎</span></a>
        </div>
      </div>
    </section>

  </main>

  <!-- 공통 푸터 -->
  <div data-include="footer"></div>

  <!-- Scripts -->
  <script src="js/include.js"></script>
  <script src="js/common.js"></script>
  <script src="js/renewal.js"></script>
</body>
</html>
