<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>공지사항 | BLACK DESERT</title>
  <meta name="description" content="검은사막의 최신 공지, 업데이트, 이벤트 소식을 확인하세요." />

  <!-- 폰트 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

  <!-- CSS -->
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/renewal.css" />
</head>
<body class="rn">
  <a href="#main" class="skip-link">본문 바로가기</a>

  <!-- 공통 헤더 -->
  <div data-include="header"></div>

  <main id="main" data-news-page>

    <!-- 상단 배너 -->
    <section class="rn-pagehead" aria-label="공지사항">
      <div class="rn-pagehead__bg" aria-hidden="true"></div>
      <div class="rn-inner">
        <p class="rn-pagehead__eyebrow">News</p>
        <h1 class="rn-pagehead__title rn-gold-text">공지사항</h1>
      </div>
    </section>

    <!-- 게시판 -->
    <section class="rn-section" style="padding-top:clamp(40px,6vh,70px)">
      <div class="rn-inner">
        <!-- 탭 필터 -->
        <div class="rn-tabs rn-reveal" id="newsTabs" role="tablist">
          <button type="button" class="rn-tab is-active" data-cat="전체">전체</button>
          <button type="button" class="rn-tab" data-cat="공지">공지</button>
          <button type="button" class="rn-tab" data-cat="업데이트">업데이트</button>
          <button type="button" class="rn-tab" data-cat="이벤트">이벤트</button>
          <button type="button" class="rn-tab" data-cat="점검">점검</button>
        </div>

        <!-- 게시글 리스트 (JS가 채움) -->
        <div class="rn-news__list rn-reveal" data-delay="1" id="newsList"></div>

        <!-- 페이지네이션 (JS가 채움) -->
        <div class="rn-pager" id="newsPager"></div>

        <!-- 글쓰기 -->
        <div class="rn-news__actions">
          <a href="news-write.html" class="rn-btn rn-btn--primary">글쓰기 <span aria-hidden="true">✎</span></a>
        </div>
      </div>
    </section>

  </main>

  <!-- 공통 푸터 -->
  <div data-include="footer"></div>

  <!-- Scripts -->
  <script src="js/include.js"></script>
  <script src="js/common.js"></script>
  <script src="js/renewal.js"></script>
</body>
</html>
