<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>클래스 소개 | BLACK DESERT</title>
  <meta name="description" content="검은사막의 클래스를 소개합니다. 저마다의 전투 방식을 가진 캐릭터 중 당신의 전설을 선택하세요." />

  <!-- 폰트 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

  <!-- CSS -->
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/renewal.css" />
</head>
<body class="rn">
  <a href="#main" class="skip-link">본문 바로가기</a>

  <!-- 공통 헤더 -->
  <div data-include="header"></div>

  <main id="main">

    <!-- =====================================================
         CLASS 소개 — owl 스타일 중앙 캐러셀
         ===================================================== -->
    <section class="rn-section rn-clspage" id="class" aria-labelledby="clsTitle" data-class-page>
      <!-- 선택 클래스 배경 (JS가 갱신) -->
      <div class="rn-clspage__bg" id="clsBg" aria-hidden="true"></div>
      <div class="rn-hero__embers" id="heroEmbers" aria-hidden="true"></div>

      <div class="rn-inner">
        <div class="rn-head rn-reveal" style="margin-bottom:14px">
          <span class="rn-eyebrow">Choose Your Class</span>
          <h2 class="rn-title rn-gold-text" id="clsTitle">클래스 소개</h2>
          <p class="rn-desc">저마다의 전투 방식을 가진 클래스. 당신의 전설을 선택하세요.</p>
        </div>

        <!-- 캐러셀 (JS가 .rn-owl__track 안을 채움) -->
        <div class="rn-owl rn-reveal" data-delay="1">
          <div class="rn-owl__viewport">
            <div class="rn-owl__track" id="owlTrack"></div>
          </div>
          <button type="button" class="rn-owl__nav rn-owl__nav--prev" id="owlPrev" aria-label="이전 클래스">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button type="button" class="rn-owl__nav rn-owl__nav--next" id="owlNext" aria-label="다음 클래스">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <div class="rn-owl__dots" id="owlDots" aria-hidden="true"></div>
        </div>

        <!-- 선택 클래스 상세 -->
        <div class="rn-clsinfo" id="clsInfo">
          <span class="rn-clsinfo__role" id="clsRole"></span>
          <h3 class="rn-clsinfo__name rn-gold-text" id="clsName"></h3>
          <span class="rn-clsinfo__en" id="clsEn"></span>
          <p class="rn-clsinfo__desc" id="clsDesc"></p>
          <div class="rn-clsinfo__tags" id="clsTags"></div>
        </div>
      </div>
    </section>

    <!-- CTA -->
    <section class="rn-cta" id="final" aria-labelledby="finalTitle">
      <div class="rn-cta__bg" aria-hidden="true"></div>
      <div class="rn-inner">
        <h2 class="rn-cta__title rn-gold-text rn-reveal" id="finalTitle">당신의 클래스를 선택하라</h2>
        <p class="rn-cta__sub rn-reveal" data-delay="1">지금 검은사막에서 당신만의 전설을 시작하세요.</p>
        <div class="rn-reveal" data-delay="2">
          <a href="#" class="rn-btn rn-btn--primary rn-btn--lg">게임 시작하기 <span aria-hidden="true">→</span></a>
        </div>
      </div>
    </section>

  </main>

  <!-- 공통 푸터 -->
  <div data-include="footer"></div>

  <!-- Scripts -->
  <script src="js/include.js"></script>
  <script src="js/common.js"></script>
  <script src="js/renewal.js"></script>
</body>
</html>
